name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FOUNDRY_PROFILE: ci

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Show Forge version
        run: forge --version

      - name: Build
        run: forge build --sizes

      - name: Tests
        run: forge test -vvv

      - name: Coverage
        run: forge coverage --report summary --report lcov

      - name: Gas snapshot
        run: forge snapshot --check || (echo "Gas snapshot drifted; run 'forge snapshot' locally and commit." && exit 1)

  lint:
    name: Solhint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g solhint@5
      - run: solhint 'src/**/*.sol'

  slither:
    name: Slither
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - run: pip install slither-analyzer
      - run: slither . --config-file slither.config.json
